<!DOCTYPE html>

<html>

<head>
    <title>image and marquee tags</title>
</head>

<body>

    <center>
        <h2>Image Tag</h2>
        <img src="./img1.jpg" alt="img1" width="400px" />
        <img src="./img2.jpg" alt="img2" width="400px" />
    </center>

    <hr>
    <h2>Marquee Tag</h2>
    <marquee behavior="alternate" direction="" scrollamount="20">
        <h2>Hello Full Stack Developer.</h2>
    </marquee>
    <marquee behavior="slide" direction="" scrollamount="20">
        <h3>Lorem, ipsum dolor.</h3>
    </marquee>

    <marquee behavior="" direction="right" height="400px" scrollamount="30">
        <img src="img4.gif" alt="img2" width="200px">
    </marquee>

</body>

</html>
